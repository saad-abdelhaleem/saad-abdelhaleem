cts = [\n    { name:'Rain Light Events', client:'smaea.ae · UAE', period:'2022—23', desc:'Scoped from a simple landing page into a full competition-management platform for a major Emirati agricultural festival — registration, enrollment and judging workflows.', stack:['ASP.NET Core','Razor Pages','JavaScript','SQL Server'], outcome:'Led the team and delivered end to end as the client\\u2019s main technical contact.' },\n    { name:'ERF Qatar', client:'ERF · Qatar', period:'2022', desc:'Admin portal for Qatar\\u2019s first e-waste recycling initiative, letting the internal team manage app content, user data and operational workflows.', stack:['ASP.NET Core MVC','HTML5','CSS3','JavaScript'], outcome:'Built from the ground up with a clean, responsive admin interface.' },\n    { name:'Ibnsina Pharma', client:'Ibnsina · Egypt', period:'2021—22', desc:'Custom nopCommerce plugins to extend platform functionality and improve the commerce experience for a major pharma distributor.', stack:['nopCommerce 4.2','C#','Plugin Dev'], outcome:'Upgraded plugins from 3.9 to 4.2, ensuring compatibility and performance.' }\n  ];\n\n  tabStyle(on){\n    const base = 'padding:6px 11px;border-radius:8px;font-family:\\'JetBrains Mono\\';font-size:12px;font-weight:500;cursor:pointer;transition:all .2s;border:1px solid ';\n    return on\n      ? base + 'var(--accent);background:var(--accent);color:#06101f;'\n      : base + 'rgba(255,255,255,.0);background:transparent;color:#8b97ad;';\n  }\n\n  setHero(n){ this.setState({ heroVariant: n }); }\n\n  rootRef = (el) => { if (el) { this._root = el; el.style.setProperty('--accent', this.props.accentColor || '#2C7BE5'); } };\n  progressRef = (el) => { this._progress = el; };\n\n  canvasRef = (el) => {\n    if (el && el !== this._canvasEl){ this._canvasEl = el; this.startConstellation(el); }\n    else if (!el){ this.stopConstellation(); this._canvasEl = null; }\n  };\n\n  startConstellation(canvas){\n    this.stopConstellation();\n    const ctx = canvas.getContext('2d');\n    const DPR = Math.min(window.devicePixelRatio || 1, 2);\n    let w = 0, h = 0, pts = [];\n    const resize = () => {\n      const r = canvas.getBoundingClientRect();\n      w = r.width; h = r.height;\n      canvas.width = w * DPR; canvas.height = h * DPR;\n      ctx.setTransform(DPR, 0, 0, DPR, 0, 0);\n      const N = Math.max(34, Math.min(90, Math.floor(w * h / 17000)));\n      pts = Array.from({ length: N }, () => ({\n        x: Math.random() * w, y: Math.random() * h,\n        vx: (Math.random() - .5) * .25, vy: (Math.random() - .5) * .25\n      }));\n    };\n    resize();\n    this._onResize = resize;\n    window.addEventListener('resize', resize);\n    const loop = () => {\n      ctx.clearRect(0, 0, w, h);\n      for (const p of pts){\n        p.x += p.vx; p.y += p.vy;\n        if (p.x < 0 || p.x > w) p.vx *= -1;\n        if (p.y < 0 || p.y > h) p.vy *= -1;\n      }\n      for (let i = 0; i < pts.length; i++){\n        for (let j = i + 1; j < pts.length; j++){\n          const a = pts[i], b = pts[j];\n          const dx = a.x - b.x, dy = a.y - b.y;\n          const d = Math.hypot(dx, dy);\n          if (d < 128){\n            ctx.strokeStyle = 'rgba(44,123,229,' + (0.16 * (1 - d / 128)) + ')';\n            ctx.lineWidth = 1;\n            ctx.beginPath(); ctx.moveTo(a.x, a.y); ctx.lineTo(b.x, b.y); ctx.stroke();\n          }\n        }\n      }\n      for (const p of pts){\n        ctx.fillStyle = 'rgba(120,170,240,0.5)';\n        ctx.beginPath(); ctx.arc(p.x, p.y, 1.4, 0, 7); ctx.fill();\n      }\n      this._raf = requestAnimationFrame(loop);\n    };\n    loop();\n  }\n\n  stopConstellation(){\n    if (this._raf) cancelAnimationFrame(this._raf);\n    this._raf = null;\n    if (this._onResize){ window.removeEventListener('resize', this._onResize); this._onResize = null; }\n  }\n\n  copyEmail = () => {\n    const email = 'saad.abdelhaleem@gmail.com';\n    const done = () => { this.setState({ copied: true }); clearTimeout(this._ct); this._ct = setTimeout(() => this.setState({ copied: false }), 1800); };\n    if (navigator.clipboard && navigator.clipboard.writeText){\n      navigator.clipboard.writeText(email).then(done).catch(done);\n    } else { done(); }\n  };\n\n  onScroll = () => {\n    const st = window.scrollY || document.documentElement.scrollTop || 0;\n    const h = document.documentElement.scrollHeight - window.innerHeight;\n    const p = h > 0 ? Math.min(1, st / h) : 0;\n    if (this._progress) this._progress.style.width = (p * 100) + '%';\n  };\n\n  componentDidMount(){\n    this._io = new IntersectionObserver((entries) => {\n      entries.forEach((e) => {\n        if (e.isIntersecting){\n          e.target.style.opacity = '1';\n          e.target.style.transform = 'none';\n          this._io.unobserve(e.target);\n        }\n      });\n    }, { threshold: 0.12, rootMargin: '0px 0px -7% 0px' });\n    if (this._root){\n      this._root.querySelectorAll('[data-reveal]').forEach((el) => this._io.observe(el));\n    }\n    window.addEventListener('scroll', this.onScroll, { passive: true });\n    this.onScroll();\n  }\n\n  componentDidUpdate(prevProps){\n    if (prevProps.accentColor !== this.props.accentColor && this._root){\n      this._root.style.setProperty('--accent', this.props.accentColor || '#2C7BE5');\n    }\n    if (prevProps.heroStyle !== this.props.heroStyle){\n      this.setState({ heroVariant: this.mapHero(this.props.heroStyle) });\n    }\n  }\n\n  componentWillUnmount(){\n    this.stopConstellation();\n    if (this._io) this._io.disconnect();\n    window.removeEventListener('scroll', this.onScroll);\n    clearTimeout(this._ct);\n  }\n\n  renderVals(){\n    const v = this.state.heroVariant;\n    const exps = this.experiences.map((e, i) => ({\n      ...e,\n      isOpen: this.state.openExp === i,\n      glyph: this.state.openExp === i ? '\\u2013' : '+',\n      toggle: () => this.setState((s) => ({ openExp: s.openExp === i ? null : i }))\n    }));\n    return {\n      rootRef: this.rootRef,\n      progressRef: this.progressRef,\n      canvasRef: this.canvasRef,\n      heroVariant: v,\n      isV1: v === 1, isV2: v === 2, isV3: v === 3,\n      setV1: () => this.setHero(1),\n      setV2: () => this.setHero(2),\n      setV3: () => this.setHero(3),\n      tab1Style: this.tabStyle(v === 1),\n      tab2Style: this.tabStyle(v === 2),\n      tab3Style: this.tabStyle(v === 3),\n      skillGroups: this.skillGroups,\n      experiences: exps,\n      projects: this.projects,\n      copyEmail: this.copyEmail,\n      copyLabel: this.state.copied ? 'Copied \\u2713' : 'Copy',\n      email: 'saad.abdelhaleem@gmail.com',\n      mailto: 'mailto:saad.abdelhaleem@gmail.com',\n      linkedin: 'https://linkedin.com/in/saad.abdelhaleem',\n      github: 'https://github.com/saad-abdelhaleem'\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
